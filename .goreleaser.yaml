version: 2
project_name: discord-bot

before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - id: discord-bot-linux
    env:
      - CGO_ENABLED=1
      - CC_linux_amd64=gcc
      - CXX_linux_amd64=g++
      - CC_linux_arm64=aarch64-linux-gnu-gcc
      - CXX_linux_arm64=aarch64-linux-gnu-g++
      - 'CC={{ index .Env (print "CC_" .Os "_" .Arch) }}'
      - 'CXX={{ index .Env (print "CXX_" .Os "_" .Arch) }}'
    main: ./cmd/discord-bot
    binary: discord-bot
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -X main.version={{.Version}}
  - id: discord-bot-darwin
    env:
      - CGO_ENABLED=1
    main: ./cmd/discord-bot
    binary: discord-bot
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -X main.version={{.Version}}
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

signs:
  - artifacts: checksum
    args:
      [
        "--batch",
        "-u",
        "{{ .Env.GPG_FINGERPRINT }}",
        "--output",
        "${signature}",
        "--detach-sign",
        "${artifact}",
      ]

brews:
  - name: discord-bot
    description: "Go-hosted Discord bot runtime with a JavaScript authoring API"
    homepage: "https://github.com/go-go-golems/discord-bot"
    repository:
      owner: go-go-golems
      name: homebrew-go-go-go
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

nfpms:
  - id: packages
    vendor: GO GO GOLEMS
    homepage: https://github.com/go-go-golems/
    maintainer: Manuel Odendahl <wesen@ruinwesen.com>
    description: |
      discord-bot is a Go-hosted Discord bot runtime with a local
      JavaScript bot API. Bots are authored in JS and run inside an
      embedded goja runtime hosted by Go.
    license: MIT
    formats:
      - deb
      - rpm
    release: "1"
    section: default
    priority: extra
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

publishers:
  - name: fury.io
    ids:
      - packages
    dir: "{{ dir .ArtifactPath }}"
    cmd: curl -F package=@{{ .ArtifactName }} https://{{ .Env.FURY_TOKEN }}@push.fury.io/go-go-golems/
